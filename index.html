<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Project Management Hub</title>
  
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://d3js.org/d3.v7.min.js"></script>

  <style>
    :root { --primary: #2563eb; --secondary: #10b981; --bg: #f8fafc; }
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); margin: 0; padding: 20px; color: #1e293b; }
    .container { max-width: 1100px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
    
    h1 { border-bottom: 2px solid var(--primary); padding-bottom: 10px; }
    .input-section { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 10px; margin-bottom: 30px; }
    input { padding: 12px; border: 1px solid #cbd5e1; border-radius: 6px; }
    button { padding: 12px; background: var(--primary); color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
    button:hover { opacity: 0.9; }

    /* Layout Grids */
    .dashboard { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 30px; }
    table { width: 100%; border-collapse: collapse; background: #fff; }
    th, td { padding: 12px; border-bottom: 1px solid #e2e8f0; text-align: left; }
    th { background: #f1f5f9; font-size: 0.8rem; text-transform: uppercase; }

    /* Mind Map Styles */
    #mindmap { width: 100%; height: 500px; border: 1px solid #e2e8f0; border-radius: 8px; margin-top: 20px; background: #ffffff; }
    .link { fill: none; stroke: #94a3b8; stroke-width: 1.5px; }
    .client-box { fill: var(--primary); stroke: #1e40af; }
    .employee-box { fill: var(--secondary); stroke: #065f46; }
    .node text { font-size: 11px; fill: white; pointer-events: none; }
    .job-text { fill: #334155; font-weight: bold; font-style: italic; }
  </style>
</head>
<body>

<div class="container">
  <h1>📈 Client & Job Tracker</h1>

  <div class="input-section">
    <input id="client" placeholder="Client Name">
    <input id="job" placeholder="Job/Task">
    <input id="employee" placeholder="Assigned To">
    <input id="revenue" type="number" placeholder="Revenue ($)">
    <button onclick="addJob()">Add to Tracker</button>
  </div>

  <div class="dashboard">
    <div>
      <h3>Revenue by Client</h3>
      <canvas id="chart"></canvas>
    </div>
    <div>
      <h3>Recent Orders</h3>
      <table>
        <thead>
          <tr><th>Client</th><th>Job</th><th>Revenue</th></tr>
        </thead>
        <tbody id="jobTable"></tbody>
      </table>
    </div>
  </div>

  <h3>Hierarchical Mind Map</h3>
  <svg id="mindmap"></svg>
</div>

<script>
  // INITIAL DATA
  let jobs = JSON.parse(localStorage.getItem('jobs')) || [];
  let chart;

  // CORE FUNCTIONS
  function addJob() {
    const client = document.getElementById('client').value;
    const job = document.getElementById('job').value;
    const employee = document.getElementById('employee').value;
    const revenue = parseFloat(document.getElementById('revenue').value);

    if (!client || !job || !employee || isNaN(revenue)) {
      alert("Please fill in all fields correctly.");
      return;
    }

    jobs.push({ client, job, employee, revenue });
    updateEverything();

    // Clear inputs
    ['client', 'job', 'employee', 'revenue'].forEach(id => document.getElementById(id).value = '');
  }

  function updateEverything() {
    localStorage.setItem('jobs', JSON.stringify(jobs));
    renderTable();
    renderChart();
    renderMindMap();
  }

  function renderTable() {
    const table = document.getElementById('jobTable');
    table.innerHTML = jobs.slice(-5).map(j => `
      <tr>
        <td><strong>${j.client}</strong></td>
        <td>${j.job}</td>
        <td>$${j.revenue.toLocaleString()}</td>
      </tr>
    `).join('');
  }

  function renderChart() {
    const ctx = document.getElementById('chart').getContext('2d');
    const totals = {};
    jobs.forEach(j => totals[j.client] = (totals[j.client] || 0) + j.revenue);

    if (chart) chart.destroy();
    chart = new Chart(ctx, {
      type: 'bar',
      data: {
        labels: Object.keys(totals),
        datasets: [{ label: 'Total Revenue', data: Object.values(totals), backgroundColor: '#2563eb' }]
      }
    });
  }

  // MIND MAP LOGIC
  function buildTree() {
    const tree = { name: "Organization", children: [] };
    const clients = {};
    jobs.forEach(j => {
      if (!clients[j.client]) {
        clients[j.client] = { name: j.client, type: "client", children: [] };
        tree.children.push(clients[j.client]);
      }
      clients[j.client].children.push({
        name: j.job,
        type: "job",
        children: [{ name: j.employee, type: "employee" }]
      });
    });
    return tree;
  }

  function renderMindMap() {
    const treeData = buildTree();
    const svg = d3.select("#mindmap");
    svg.selectAll("*").remove();

    const width = document.getElementById('mindmap').clientWidth;
    const height = 500;
    const g = svg.append("g").attr("transform", "translate(80,0)");

    const root = d3.hierarchy(treeData);
    const treeLayout = d3.tree().size([height, width - 250]);
    treeLayout(root);

    // Links
    g.selectAll(".link")
      .data(root.links())
      .enter().append("path")
      .attr("class", "link")
      .attr("d", d3.linkHorizontal().x(d => d.y).y(d => d.x));

    // Nodes
    const node = g.selectAll(".node")
      .data(root.descendants().slice(1)) 
      .enter().append("g")
      .attr("transform", d => `translate(${d.y},${d.x})`);

    // Text & Rectangles
    node.append("text")
      .attr("text-anchor", "middle")
      .attr("dy", "0.35em")
      .attr("class", d => d.data.type === "job" ? "job-text" : "")
      .text(d => d.data.name)
      .each(function(d) {
        const b = this.getBBox();
        d.w = b.width + 20;
        d.h = b.height + 10;
      });

    node.filter(d => d.data.type !== "job")
      .insert("rect", "text")
      .attr("x", d => -d.w / 2)
      .attr("y", d => -d.h / 2)
      .attr("width", d => d.w)
      .attr("height", d => d.h)
      .attr("rx", 6)
      .attr("class", d => d.data.type === "client" ? "client-box" : "employee-box");
  }

  // Run on page load
  updateEverything();
</script>

</body>
</html>
