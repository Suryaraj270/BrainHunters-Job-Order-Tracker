<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RM Job Management System</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <style>
    :root { --primary: #065f46; --secondary: #059669; --accent: #f59e0b; --danger: #be123c; --bg: #f0fdf4; }
    body { font-family: 'Inter', sans-serif; background: var(--bg); margin: 0; padding: 20px; color: #111827; }
    .container { max-width: 1200px; margin: auto; background: white; padding: 25px; border-radius: 16px; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); }
    
    /* Input Panels */
    .panel-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 15px; margin-bottom: 30px; }
    .card { background: #ffffff; border: 1px solid #e5e7eb; padding: 15px; border-radius: 10px; }
    h3 { margin-top: 0; font-size: 1rem; color: var(--primary); border-bottom: 1px solid #f3f4f6; padding-bottom: 8px; }
    
    input, select, button { width: 100%; padding: 10px; margin: 5px 0; border-radius: 6px; border: 1px solid #d1d5db; box-sizing: border-box; }
    button { background: var(--primary); color: white; border: none; cursor: pointer; font-weight: 600; transition: 0.2s; }
    button:hover { background: var(--secondary); }
    .btn-del { background: var(--danger); width: auto; padding: 5px 10px; font-size: 0.7rem; }

    /* Visuals */
    .visuals { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    #mindmap { width: 100%; height: 500px; border: 1px solid #e5e7eb; border-radius: 12px; margin-top: 20px; background: #fff; }
    
    table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
    th, td { padding: 10px; text-align: left; border-bottom: 1px solid #f3f4f6; }
    .currency { font-family: monospace; font-weight: bold; color: #047857; }
    
    /* D3 Colors */
    .link { fill: none; stroke: #d1d5db; stroke-width: 2px; }
    .client-box { fill: #065f46; }
    .job-box { fill: #b45309; }
    .employee-box { fill: #059669; }
    rect { stroke: rgba(0,0,0,0.1); }
    text { fill: white; font-size: 11px; font-weight: 600; pointer-events: none; }
  </style>
</head>
<body>

<div class="container">
  <h1>🇲🇾 Client & Job Hierarchy (RM)</h1>

  <div class="panel-grid">
    <div class="card">
      <h3>1. Register Client</h3>
      <input id="newClient" placeholder="Enter New Client Name">
      <button onclick="addClient()">Add Client</button>
    </div>

    <div class="card">
      <h3>2. Assign Job to Client</h3>
      <select id="clientSelect"></select>
      <input id="newJob" placeholder="Enter Job Title">
      <button onclick="addJob()">Add Job</button>
    </div>

    <div class="card">
      <h3>3. Add Staff & Revenue</h3>
      <select id="jobSelect"></select>
      <input id="staffName" placeholder="Staff Name">
      <input id="revenue" type="number" placeholder="Revenue (RM)">
      <button onclick="addStaff()">Add Record</button>
    </div>
  </div>

  <div class="visuals">
    <div>
      <h3>Revenue Analytics (RM)</h3>
      <canvas id="chart"></canvas>
      <div style="margin-top:20px">
        <h3>Master Record</h3>
        <table id="mainTable">
          <thead><tr><th>Path</th><th>Staff</th><th>Revenue</th><th>Action</th></tr></thead>
          <tbody id="tableBody"></tbody>
        </table>
      </div>
    </div>
    <div>
      <h3>Organizational Mind Map</h3>
      <svg id="mindmap"></svg>
    </div>
  </div>
</div>

<script>
  // Data Structure: [{name: "Client", jobs: [{title: "Job", staff: [{name: "Ali", rev: 100}]}]}]
  let data = JSON.parse(localStorage.getItem('jobTrackerRM')) || [];
  let chart;

  function addClient() {
    const name = document.getElementById('newClient').value.trim();
    if (!name) return;
    data.push({ id: Date.now(), name, jobs: [] });
    saveAndRefresh();
    document.getElementById('newClient').value = '';
  }

  function addJob() {
    const clientId = parseInt(document.getElementById('clientSelect').value);
    const title = document.getElementById('newJob').value.trim();
    if (!clientId || !title) return;
    const client = data.find(c => c.id === clientId);
    client.jobs.push({ id: Date.now(), title, staff: [] });
    saveAndRefresh();
    document.getElementById('newJob').value = '';
  }

  function addStaff() {
    const ids = document.getElementById('jobSelect').value.split('|');
    const name = document.getElementById('staffName').value.trim();
    const rev = parseFloat(document.getElementById('revenue').value);
    if (ids.length < 2 || !name || isNaN(rev)) return;

    const client = data.find(c => c.id == ids[0]);
    const job = client.jobs.find(j => j.id == ids[1]);
    job.staff.push({ id: Date.now(), name, rev });
    saveAndRefresh();
    document.getElementById('staffName').value = '';
    document.getElementById('revenue').value = '';
  }

  function deleteRecord(cId, jId, sId) {
    const client = data.find(c => c.id === cId);
    const job = client.jobs.find(j => j.id === jId);
    job.staff = job.staff.filter(s => s.id !== sId);
    saveAndRefresh();
  }

  function saveAndRefresh() {
    localStorage.setItem('jobTrackerRM', JSON.stringify(data));
    updateDropdowns();
    renderTable();
    renderChart();
    renderMindMap();
  }

  function updateDropdowns() {
    const cSelect = document.getElementById('clientSelect');
    const jSelect = document.getElementById('jobSelect');
    
    cSelect.innerHTML = data.map(c => `<option value="${c.id}">${c.name}</option>`).join('');
    
    let jobOptions = "";
    data.forEach(c => {
      c.jobs.forEach(j => {
        jobOptions += `<option value="${c.id}|${j.id}">${c.name} > ${j.title}</option>`;
      });
    });
    jSelect.innerHTML = jobOptions;
  }

  function renderTable() {
    const tbody = document.getElementById('tableBody');
    let html = "";
    data.forEach(c => {
      c.jobs.forEach(j => {
        j.staff.forEach(s => {
          html += `<tr>
            <td>${c.name} / ${j.title}</td>
            <td>${s.name}</td>
            <td class="currency">RM ${s.rev.toLocaleString()}</td>
            <td><button class="btn-del" onclick="deleteRecord(${c.id}, ${j.id}, ${s.id})">Del</button></td>
          </tr>`;
        });
      });
    });
    tbody.innerHTML = html;
  }

  function renderChart() {
    const ctx = document.getElementById('chart').getContext('2d');
    const labels = data.map(c => c.name);
    const revs = data.map(c => {
      let total = 0;
      c.jobs.forEach(j => j.staff.forEach(s => total += s.rev));
      return total;
    });

    if (chart) chart.destroy();
    chart = new Chart(ctx, {
      type: 'bar',
      data: {
        labels: labels,
        datasets: [{ label: 'Total Revenue (RM)', data: revs, backgroundColor: '#059669' }]
      }
    });
  }

  function renderMindMap() {
    const svg = d3.select("#mindmap");
    svg.selectAll("*").remove();
    if (data.length === 0) return;

    // Convert our custom data to D3 Hierarchy
    const treeData = { name: "ROOT", children: data.map(c => ({
      name: c.name, type: "client", children: c.jobs.map(j => ({
        name: j.title, type: "job", children: j.staff.map(s => ({
          name: `${s.name} (RM${s.rev})`, type: "employee"
        }))
      }))
    }))};

    const width = document.getElementById('mindmap').clientWidth;
    const height = 500;
    const g = svg.append("g").attr("transform", "translate(-100, 20)");

    const root = d3.hierarchy(treeData);
    const treeLayout = d3.tree().size([height - 40, width]);
    treeLayout(root);

    g.selectAll(".link").data(root.links().filter(d => d.source.depth > 0))
      .enter().append("path").attr("class", "link")
      .attr("d", d3.linkHorizontal().x(d => d.y).y(d => d.x));

    const node = g.selectAll(".node").data(root.descendants().filter(d => d.depth > 0))
      .enter().append("g").attr("transform", d => `translate(${d.y},${d.x})`);

    node.append("text").attr("text-anchor", "middle").attr("dy", "0.35em")
      .text(d => d.data.name).each(function(d) {
        const b = this.getBBox();
        d.w = b.width + 20; d.h = b.height + 12;
      });

    node.insert("rect", "text").attr("x", d => -d.w/2).attr("y", d => -d.h/2)
      .attr("width", d => d.w).attr("height", d => d.h).attr("rx", 6)
      .attr("class", d => `${d.data.type}-box`);
  }

  saveAndRefresh();
</script>
</body>
</html>
